<!DOCTYPE html>
<html>
<head>
	<title>
		Player Field
	</title>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no">
    <meta name="theme-color" content="#000000">
	<link rel="icon" href="/favicon.svg" type="image/svg+xml">
	<link rel="stylesheet" type="text/css" href="/css/style.css" >
	<link rel="stylesheet" type="text/css" href="/css/input_name.css" >
	<link rel="stylesheet" href="/css/simple_modal.css">
	<link rel="stylesheet" href="/css/custom_radio.css">
</head>
<body>
	<div class="game_options">
	  <h2 id="vote_heading_time">Vote: answer time</h2>
	  <p class="game_options__field">
	    <select id="vote_select_time" class="game_options__select" aria-labelledby="vote_heading_time">
	      <option value="15">15 seconds</option>
	      <option value="20" selected>20 seconds</option>
	      <option value="30">30 seconds</option>
	    </select>
	  </p>
	  <h2 id="vote_heading_decade">Vote: decade</h2>
	  <p class="game_options__field">
	    <select id="vote_select_decade" class="game_options__select" aria-labelledby="vote_heading_decade">
	      <option value="80s">1980s</option>
	      <option value="90s">1990s</option>
	      <option value="00s">2000s</option>
	      <option value="10s">2010s</option>
	      <option value="20s" selected>2020s</option>
	    </select>
	  </p>
	  <h2 id="vote_heading_episode">Vote: episode type</h2>
	  <p class="game_options__field">
	    <select id="vote_select_episode" class="game_options__select" aria-labelledby="vote_heading_episode">
	      <option value="any" selected>Any</option>
	      <option value="kids">Kids Week</option>
	      <option value="teen">Teen Tournament</option>
	      <option value="college">College Championship</option>
	      <option value="celebrity">Celebrity Jeopardy</option>
	      <option value="teacher">Teachers Tournament</option>
	      <option value="champions">Tournament of Champions</option>
	    </select>
	  </p>
	  <p id="vote_feedback" class="game_options__feedback" role="status" aria-live="polite" hidden></p>
	  <button type="button" class="fancy_button bg-gradient1" id="options_accept">OK</button>
	</div>
	<div class="restart">
		<form id="restart_game" action="">
			<button class="fancy_button bg-gradient1" id="restart_btn">Play Again!</button>
		</form>
	</div>
	<div id="login_container">
		<div class= "login">
			<div class="wrap-label">
		     <label for="name">Your Name</label>
		     <p class="login-name-pen-icon" aria-hidden="true"></p>
		  </div>
			<form id="player_login" action="">
				<input id="login_name" autocomplete="off" /><button class="fancy_button bg-gradient1" id="join_btn">Join Game!</button>
			</form>
			<p id="jeopardy_saved_name_hint" class="login-saved-hint" hidden>
				<button type="button" id="jeopardy_clear_saved_player" class="login-clear-saved">Use a different name</button>
			</p>
		</div>
	</div>
	<div id="message_overlay">
		<img src="/game-media/images/jeopardy-logo.png" id="message_overlay_logo">
	</div>
	<div class = "player_field">
		<div class = "player_field_container">
			<div class = "player_question">
				<div class="player_question_revealed_bounds">
					<h2 id="question_revealed"> Your Question Will Appear Here </h2>
				</div>
			</div>
			<div class= "player_buzzer">	
				<button class="buzzer"> BUZZ IN </button>
			</div>
			<div class = "player_answer_field">
				<div class="player_answer_row">
					<form id="answer_submit" class="player_answer_form" action="">
						<div class="player_answer_input_row">
							<input id="answer_field" autocomplete="off" placeholder="What is..."/>
						</div>
						<div class="player_answer_actions">
							<button type="submit" id="answer_btn">Submit</button>
							<button type="button" id="start_button" class="mic_button" aria-label="Dictate answer with microphone" title="Dictate answer (uses your device microphone)">
								<img id="start_img" src="/game-media/images/mic.gif" alt="">
							</button>
						</div>
					</form>
				</div>
				<p id="mic_unsupported" class="mic_unsupported" hidden>Speech recognition is not supported in this browser. Type your answer instead.</p>
			</div>
			<div class = "player_bet_field">
				<form id="bet_submit" action="">
		      		<input id="bet_field" autocomplete="off" placeholder="Enter your wager."/><button id="bet_btn">Make Wager</button>
		    	</form>
			</div>
			<div class = "player_timer">
				<table id="timer_table" cellspacing="0">
				<tr>
					<td class="timer_cell_5">&nbsp;</td><td class="timer_cell_4">&nbsp;</td><td class="timer_cell_3">&nbsp;</td><td class="timer_cell_2">&nbsp;</td>
					<td class="timer_cell_1">&nbsp;</td>
					<td class="timer_cell_2">&nbsp;</td><td class="timer_cell_3">&nbsp;</td><td class="timer_cell_4">&nbsp;</td><td class="timer_cell_5">&nbsp;</td>
				</tr>
				</table>
			</div>
			<div class = "player_field_info">
			</div>
		</div>
		<div>
			<h2 id="active_message"></h2>
		</div>
	</div>
	<!-- Same-origin scripts avoid long hangs when CDN (cdnjs / Google) is slow or blocked -->
	<script src="/socket.io/socket.io.js"></script>
	<script src="/javascript/libraries/jquery-3.7.1.min.js"></script>
	<script src="/javascript/libraries/simple_modal.js"></script>
    <script src="/javascript/libraries/transit.min.js"></script>
	<script src="/javascript/board_category_headers.js"></script>
	<script src="/javascript/pages/player_field.js"></script>
	<script src="/javascript/libraries/gradients.js"></script>
</body>
</html>
